<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Personal Site</title>

  <!-- Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- KaTeX 数学公式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }

    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      padding: 20px;
    }

    .nav {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .nav button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .section {
      display: none;
      max-width: 900px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }

    .active {
      display: block;
    }

    textarea, input {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button.primary {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: #00d4ff;
      color: black;
      cursor: pointer;
      border-radius: 5px;
    }

    .post {
      background: rgba(255,255,255,0.2);
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    #girl {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 240px;
      cursor: grab;
    }
  </style>
</head>
<body>

<div class="overlay">

  <div class="nav">
    <button onclick="show('about')">关于我</button>
    <button onclick="show('blog')">博客</button>
    <button onclick="show('publish')">写博客</button>
  </div>

  <div id="about" class="section active">
    <h2>个人介绍</h2>
    <p>这里写你的研究方向（KG / LLM / 多模态等）</p>
    <p>
      <a href="https://space.bilibili.com/你的UID" target="_blank">Bilibili主页</a>
    </p>
  </div>

  <div id="blog" class="section">
    <h2>博客列表</h2>
    <div id="posts"></div>
  </div>

  <div id="publish" class="section">
    <h2>发布博客（Markdown 支持）</h2>
    <input id="title" placeholder="标题">
    <textarea id="content" rows="10" placeholder="支持 Markdown + LaTeX"></textarea>
    <button class="primary" onclick="addPost()">发布</button>
  </div>

</div>

<img src="girl.png" id="girl">

<script>

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function addPost() {
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;

  const post = {
    id: Date.now(),
    title,
    content,
    time: new Date().toLocaleString()
  };

  let posts = JSON.parse(localStorage.getItem('posts') || '[]');
  posts.unshift(post);
  localStorage.setItem('posts', JSON.stringify(posts));

  renderPosts();
}

function renderPosts() {
  const posts = JSON.parse(localStorage.getItem('posts') || '[]');
  const container = document.getElementById('posts');
  container.innerHTML = '';

  posts.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post';

    const html = marked.parse(p.content);

    div.innerHTML = `
      <h3>${p.title}</h3>
      <div>${html}</div>
      <small>${p.time}</small><br>
      <button onclick="deletePost(${p.id})">删除</button>
    `;

    container.appendChild(div);
  });

  renderMathInElement(document.body);
}

function deletePost(id) {
  let posts = JSON.parse(localStorage.getItem('posts') || '[]');
  posts = posts.filter(p => p.id !== id);
  localStorage.setItem('posts', JSON.stringify(posts));
  renderPosts();
}

// 看板娘拖动
const girl = document.getElementById('girl');
let offsetX, offsetY, dragging = false;

girl.addEventListener('mousedown', (e) => {
  dragging = true;
  offsetX = e.clientX - girl.offsetLeft;
  offsetY = e.clientY - girl.offsetTop;
});

document.addEventListener('mousemove', (e) => {
  if (dragging) {
    girl.style.left = (e.clientX - offsetX) + 'px';
    girl.style.top = (e.clientY - offsetY) + 'px';
    girl.style.right = 'auto';
    girl.style.bottom = 'auto';
  }
});

document.addEventListener('mouseup', () => dragging = false);

renderPosts();

</script>

<!-- Giscus 评论系统 -->
<script src="https://giscus.app/client.js"
        data-repo="你的GitHub用户名/仓库名"
        data-repo-id="REPO_ID"
        data-category="Announcements"
        data-category-id="CATEGORY_ID"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="dark"
        crossorigin="anonymous"
        async>
</script>

</body>
</html>
